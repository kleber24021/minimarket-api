services:
  mock-api:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install --no-package-lock --silent && npm start"
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - ./:/app:ro
      - node_modules:/app/node_modules

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    depends_on:
      - mock-api
    ports:
      - "${SWAGGER_PORT:-8080}:8080"
    environment:
      SWAGGER_JSON: /spec/openapi.yaml
    volumes:
      - ./openapi/openapi.yaml:/spec/openapi.yaml:ro

volumes:
  node_modules:
