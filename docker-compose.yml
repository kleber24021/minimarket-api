services:
  mock-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-3000}:3000"

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    depends_on:
      - mock-api
    ports:
      - "${SWAGGER_PORT:-8080}:8080"
    environment:
      SWAGGER_JSON: /spec/openapi.yaml
    volumes:
      - ./openapi/openapi.yaml:/spec/openapi.yaml:ro
